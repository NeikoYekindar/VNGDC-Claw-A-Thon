worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths that don't require root
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;

    server {
        listen 8080;
        server_name _;
        root /app;

        # GET / → serve Chat UI HTML (rewrite inside if = safe in nginx)
        # POST / → falls through to proxy_pass (outside the if = safe)
        location = / {
            if ($request_method = GET) {
                rewrite ^ /chat_ui.html last;
            }
            proxy_pass              http://127.0.0.1:8081;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_pass_request_body on;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
        }

        # Serve HTML file
        location = /chat_ui.html {
            add_header Cache-Control "no-cache";
        }

        # All other paths (health, ping, etc.) → Python agent
        location / {
            proxy_pass              http://127.0.0.1:8081;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_pass_request_body on;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
        }
    }
}
